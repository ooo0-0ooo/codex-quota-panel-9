<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light" />
    <title>Codex Quota Panel</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="quota-panel" aria-label="Codex 额度面板">
      <button class="language-button no-drag" id="language-button" type="button">EN</button>
      <button class="close-button no-drag" id="close-button" type="button" aria-label="隐藏到系统托盘">
        <img src="./assets/close.svg" alt="" />
      </button>

      <section class="header-block">
        <h1 id="title">Codex Quota</h1>
        <article class="card weekly-card">
          <div class="quota-copy">
            <strong id="weekly-title">每周使用限额</strong>
            <span id="weekly-reset"></span>
          </div>
          <div class="progress-copy">
            <div class="progress-track" aria-hidden="true">
              <div class="progress-value" id="progress-value"></div>
            </div>
            <span id="remaining"></span>
          </div>
        </article>
      </section>

      <section class="columns">
        <div class="reset-column">
          <h2 id="reset-heading">使用限额重置</h2>
          <div class="reset-list" id="reset-list"></div>
        </div>

        <div class="token-column">
          <h2 id="token-heading">Token 用量</h2>
          <div class="token-list">
            <article class="card token-card">
              <span class="token-label" id="today-label">今日 Token</span>
              <div class="token-line"><strong id="today-tokens"></strong></div>
            </article>
            <article class="card token-card">
              <span class="token-label" id="total-label">累计 Token</span>
              <div class="token-line"><strong id="total-tokens"></strong></div>
            </article>
          </div>
        </div>
      </section>

      <div class="context-menu no-drag" id="context-menu" role="menu" hidden>
        <button id="refresh-menu" data-action="refresh" role="menuitem">刷新真实数据</button>
        <button id="pin-menu" data-action="pin" role="menuitem">取消置顶</button>
        <button id="quit-menu" data-action="quit" role="menuitem">退出应用</button>
      </div>
    </main>
    <script type="module" src="./renderer.js"></script>
  </body>
</html>
